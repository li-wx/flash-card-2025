# This workflow will build and deploy a Python Flask app to Azure Web App on every push to main
# Replace <YOUR_WEBAPP_NAME> and <YOUR_RESOURCE_GROUP> with your Azure details

name: Azure Flask Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Zip project files
      run: |
        zip -r app.zip . -x '*.git*' '*.venv*' '*.conda*'

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: <my-wordcard-app>
        slot-name: 'production'
        package: app.zip
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
