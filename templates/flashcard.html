<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flashcard App</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #ccc; width: 400px; margin: 40px auto; padding: 32px; text-align: center; }
        .word { font-size: 2em; margin-bottom: 16px; }
        .definition { font-size: 1.2em; color: #333; margin: 24px 0; }
    button { display: block; width: 100%; margin: 8px 0; padding: 10px 24px; font-size: 1em; border-radius: 6px; border: none; background: #1976d2; color: #fff; cursor: pointer; box-sizing: border-box; }
        button:hover { background: #1565c0; }
        .msg { margin: 16px 0; color: #388e3c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="word" id="word">{{ word.word }}</div>
        <div style="margin-bottom:12px;">
            <button id="stats-toggle" onclick="toggleStatistics()">Show Statistics</button>
        </div>
        <div id="statistics" style="display:none; margin-bottom:12px;">
            <span><strong>Strength (S):</strong> {{ S }}</span><br>
            <span><strong>Last Review (T):</strong> {{ T }}</span><br>
            <span><strong>Memory Score (M):</strong> {{ M }}</span><br>
            <span><strong>Estimated number of words learned:</strong> {{ estimated_learned }}</span>
        </div>
        <button onclick="playPronunciation()">🔊 Pronounce</button>
        <div class="definition" id="definition" style="display:none;">{{ word.definition }}</div>
        <button onclick="showDefinition()">Show Definition</button>
        <div style="margin-top:24px;">
            <button onclick="review('A')">A) I don’t need to review</button>
            <button onclick="review('B')">B) I remember</button>
            <button onclick="review('C')">C) I don’t remember</button>
        </div>
        <div class="msg" id="msg"></div>
    </div>
    <script>
        function showDefinition() {
            document.getElementById('definition').style.display = 'block';
        }
        function playPronunciation() {
            const word = document.getElementById('word').innerText;
            const utter = new SpeechSynthesisUtterance(word);
            utter.lang = 'en-US';
            window.speechSynthesis.speak(utter);
        }
        function toggleStatistics() {
            const statsDiv = document.getElementById('statistics');
            const button = document.getElementById('stats-toggle');
            const showing = statsDiv.style.display === 'block';
            statsDiv.style.display = showing ? 'none' : 'block';
            button.innerText = showing ? 'Show Statistics' : 'Hide Statistics';
        }
        function review(action) {
            const word = document.getElementById('word').innerText;
            fetch('/review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ word, action })
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('msg').innerText = data.msg;
                setTimeout(() => {
                    location.reload();
                }, 1200);
            });
        }
    </script>
</body>
</html>
